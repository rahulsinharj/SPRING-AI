##----------------# Spring core configurations #----------------##
spring.application.name=sprintai.ollama
server.port=8081

##----------------# SpringAi core configurations #----------------##
#spring.ai.chat.client.enabled=false
#spring.ai.model.chat=ollama

##----------------# SpringAi Ollama configurations #----------------##
#spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.base-url=${OLLAMA_BASE_URL}
#spring.ai.ollama.chat.options.model=llama3.2:1b
spring.ai.ollama.chat.options.model=phi3:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.init.pull-model-strategy=always

