##----------------# Spring core configurations #----------------##
spring.application.name=springai.openai
server.port=8081

##----------------# SpringAi OpenAI configurations #----------------##
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-5.4
spring.ai.openai.chat.options.temperature=0.7
## Temperature controls the randomness or "creativity" of the model’s response.
## Higher values (e.g., 0.8) make the output more random (More creative, varied, and potentially surprising responses) ;
## while lower values (e.g., 0.2) make it more focused and deterministic.